http:
  routers:
    template:
      rule: Host(`${DOMAIN}`) && PathPrefix(`/template`)
      service: template
      middlewares:
        - template-stripprefix
  middlewares:
    template-stripprefix:
      stripPrefix:
        prefixes:
          - /template
  services:
    template:
      loadBalancer:
        servers:
          - url: http://192.168.1.12:8081
